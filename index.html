<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD CARBONS — Advanced Carbon Nanotube Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050608;
    --dark: #0a0c0f;
    --surface: #0f1215;
    --surface2: #161a1e;
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --gold: #c9a84c;
    --white: #e8eaed;
    --muted: #6b7280;
    --border: rgba(0,229,255,0.12);
    --glow: 0 0 40px rgba(0,229,255,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--cyan); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1px solid rgba(0,229,255,0.5); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, width 0.3s, height 0.3s;
  }

  /* Navigation */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(5,6,8,0.95), transparent);
    backdrop-filter: blur(2px);
    border-bottom: 1px solid rgba(0,229,255,0.05);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 0.15em;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--cyan); }
  .nav-links {
    display: flex; gap: 40px; list-style: none;
  }
  .nav-links a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--cyan);
    transform: scaleX(0); transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--cyan); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-cta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--black); background: var(--cyan);
    padding: 10px 24px; text-decoration: none;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .nav-cta:hover { background: var(--white); box-shadow: var(--glow); }

  /* Hero */
  #hero {
    position: relative; min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 140px 60px 80px;
    overflow: hidden;
  }
  #hero-canvas {
    position: absolute; inset: 0; z-index: 0;
    opacity: 0.6;
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-content { position: relative; z-index: 1; max-width: 900px; }
  .hero-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 28px;
    display: flex; align-items: center; gap: 14px;
    opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-tag::before {
    content: ''; width: 40px; height: 1px; background: var(--cyan);
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 11vw, 11rem);
    line-height: 0.9; letter-spacing: 0.02em;
    color: var(--white);
    opacity: 0; animation: fadeUp 0.9s 0.4s forwards;
  }
  h1 .accent { color: var(--cyan); }
  h1 .line2 { display: block; color: rgba(232,234,237,0.25); }
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem; font-weight: 300; letter-spacing: 0.05em;
    color: var(--muted); max-width: 520px;
    margin-top: 32px; line-height: 1.7;
    opacity: 0; animation: fadeUp 0.9s 0.6s forwards;
  }
  .hero-actions {
    display: flex; gap: 20px; margin-top: 48px;
    opacity: 0; animation: fadeUp 0.9s 0.8s forwards;
  }
  .btn-primary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--black); background: var(--cyan);
    padding: 16px 36px; text-decoration: none;
    transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }
  .btn-primary:hover { background: var(--white); box-shadow: 0 0 60px rgba(0,229,255,0.3); }
  .btn-outline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--cyan); border: 1px solid var(--border);
    padding: 16px 36px; text-decoration: none;
    transition: all 0.3s;
  }
  .btn-outline:hover { border-color: var(--cyan); background: rgba(0,229,255,0.05); }

  .hero-stats {
    position: absolute; right: 60px; bottom: 80px;
    display: flex; flex-direction: column; gap: 28px;
    z-index: 1;
    opacity: 0; animation: fadeLeft 1s 1s forwards;
  }
  .stat { text-align: right; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; letter-spacing: 0.05em; color: var(--white);
    line-height: 1;
  }
  .stat-num span { color: var(--cyan); }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-top: 4px;
  }
  .hero-line {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
  }

  /* Sections */
  section { padding: 120px 60px; }

  .section-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .section-tag::before { content: '//'; opacity: 0.5; }
  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 6vw, 5.5rem);
    letter-spacing: 0.03em; line-height: 1;
    color: var(--white);
  }
  h2 em { color: var(--cyan); font-style: normal; }

  /* About */
  #about {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  #about::before {
    content: 'CARBON';
    position: absolute; right: -60px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20rem; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.015); line-height: 1;
    pointer-events: none;
  }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
    position: relative;
  }
  .about-text p {
    font-size: 1.2rem; font-weight: 300; letter-spacing: 0.03em;
    color: rgba(232,234,237,0.7); line-height: 1.8;
    margin-bottom: 20px;
  }
  .about-text p strong { color: var(--white); font-weight: 600; }
  .about-visual {
    position: relative;
  }
  .cnt-diagram {
    width: 100%; aspect-ratio: 1;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .hex-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid var(--border);
    animation: spin linear infinite;
  }
  .hex-ring:nth-child(1) { width: 90%; height: 90%; animation-duration: 30s; }
  .hex-ring:nth-child(2) { width: 70%; height: 70%; animation-duration: 20s; animation-direction: reverse; }
  .hex-ring:nth-child(3) { width: 50%; height: 50%; animation-duration: 15s; }
  .hex-ring::after {
    content: ''; position: absolute;
    top: -4px; left: 50%;
    width: 8px; height: 8px;
    background: var(--cyan); border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px var(--cyan);
  }
  .hex-center {
    width: 100px; height: 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 1px solid var(--border); background: var(--surface2);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .hex-center-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem; letter-spacing: 0.1em; color: var(--cyan);
  }
  .atom-label {
    position: absolute;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
  }

  /* Products */
  #products { background: var(--black); }
  .products-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px; margin-top: 60px;
  }
  .product-card {
    background: var(--surface);
    padding: 48px 36px;
    border: 1px solid var(--border);
    position: relative; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }
  .product-card:hover { border-color: rgba(0,229,255,0.35); transform: translateY(-4px); }
  .product-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .product-card:hover::before { opacity: 1; }
  .product-icon {
    width: 56px; height: 56px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    font-size: 1.6rem;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    background: var(--surface2);
  }
  .product-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.2em; color: var(--cyan);
    margin-bottom: 14px; opacity: 0.6;
  }
  .product-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.05em;
    color: var(--white); margin-bottom: 16px;
  }
  .product-desc {
    font-size: 1rem; font-weight: 300; color: var(--muted);
    line-height: 1.7; letter-spacing: 0.02em;
  }
  .product-spec {
    margin-top: 28px; padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .spec-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .spec-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
    text-transform: uppercase;
  }
  .spec-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; color: var(--cyan);
  }

  /* Technology */
  #technology {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .tech-layout {
    display: grid; grid-template-columns: 1fr 1.5fr;
    gap: 80px; margin-top: 60px; align-items: start;
  }
  .process-steps { display: flex; flex-direction: column; gap: 0; }
  .step {
    display: flex; gap: 24px; padding: 28px 0;
    border-bottom: 1px solid var(--border);
    cursor: default; transition: all 0.3s;
    position: relative;
  }
  .step:hover .step-content { transform: translateX(6px); }
  .step-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem; color: rgba(0,229,255,0.12);
    line-height: 1; min-width: 60px;
    transition: color 0.3s;
  }
  .step:hover .step-num { color: rgba(0,229,255,0.4); }
  .step-content { transition: transform 0.3s; }
  .step-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 0.05em;
    color: var(--white); margin-bottom: 8px;
  }
  .step-desc {
    font-size: 0.95rem; font-weight: 300; color: var(--muted);
    line-height: 1.6; letter-spacing: 0.02em;
  }
  .tech-right { position: sticky; top: 120px; }
  .tech-panel {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 40px; position: relative; overflow: hidden;
  }
  .tech-panel::after {
    content: '';
    position: absolute; bottom: -60px; right: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08), transparent 70%);
    pointer-events: none;
  }
  .tech-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 12px;
  }
  .tech-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem; color: var(--white);
    margin-bottom: 20px;
  }
  .tech-body {
    font-size: 1rem; font-weight: 300; color: var(--muted);
    line-height: 1.7; margin-bottom: 32px;
  }
  .temp-bar {
    position: relative; background: rgba(0,0,0,0.4);
    height: 6px; border-radius: 0; margin-bottom: 6px;
    overflow: hidden;
  }
  .temp-fill {
    position: absolute; inset: 0; right: auto;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    animation: fillBar 2s 1s both;
  }
  .temp-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
    display: flex; justify-content: space-between; margin-bottom: 16px;
  }
  @keyframes fillBar { from { width: 0; } to { width: var(--w); } }

  /* Export / Global */
  #export { background: var(--black); position: relative; overflow: hidden; }
  #export::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(0,229,255,0.04), transparent 65%);
    pointer-events: none;
  }
  .export-layout {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
  }
  .region-list { display: flex; flex-direction: column; gap: 2px; margin-top: 40px; }
  .region-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 24px; background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.3s, background 0.3s;
    cursor: default;
  }
  .region-row:hover { border-color: rgba(0,229,255,0.3); background: var(--surface2); }
  .region-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 600; letter-spacing: 0.08em;
    color: var(--white);
  }
  .region-flag { font-size: 1.4rem; }
  .region-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em;
    color: var(--cyan); text-transform: uppercase;
  }
  .export-right { }
  .cert-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 40px; }
  .cert-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 24px 20px; text-align: center;
    transition: border-color 0.3s;
  }
  .cert-card:hover { border-color: rgba(0,229,255,0.35); }
  .cert-icon { font-size: 2rem; margin-bottom: 10px; }
  .cert-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.05em;
    color: var(--white); margin-bottom: 6px;
  }
  .cert-desc {
    font-size: 0.82rem; color: var(--muted); line-height: 1.5; letter-spacing: 0.02em;
  }

  /* CTA */
  #contact {
    background: var(--surface);
    border-top: 1px solid var(--border);
    text-align: center;
    position: relative; overflow: hidden;
  }
  #contact::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.06), transparent 60%);
  }
  .contact-inner { position: relative; max-width: 720px; margin: 0 auto; }
  .contact-pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 24px;
  }
  .contact-head {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 7vw, 6rem); letter-spacing: 0.03em;
    color: var(--white); margin-bottom: 24px; line-height: 1;
  }
  .contact-sub {
    font-size: 1.1rem; font-weight: 300; color: var(--muted);
    line-height: 1.7; margin-bottom: 48px;
  }
  .contact-form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
  }
  .form-input, .form-textarea, .form-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--white); padding: 14px 18px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 1rem;
    letter-spacing: 0.03em; outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(0,229,255,0.1);
  }
  .form-textarea { resize: vertical; min-height: 120px; }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--surface2); }
  .submit-btn {
    background: var(--cyan); color: var(--black);
    border: none; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;
    padding: 18px 48px; align-self: flex-start;
    transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .submit-btn:hover { background: var(--white); box-shadow: 0 0 60px rgba(0,229,255,0.3); }

  /* Footer */
  footer {
    background: var(--black); border-top: 1px solid var(--border);
    padding: 40px 60px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 0.15em; color: var(--white);
  }
  .footer-logo span { color: var(--cyan); }
  .footer-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
    text-align: center;
  }
  .footer-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted);
    text-align: right;
  }
  .footer-right a { color: var(--cyan); text-decoration: none; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeLeft {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Scroll reveal */
  .reveal {
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }

  @media (max-width: 900px) {
    nav { padding: 20px 24px; }
    .nav-links { display: none; }
    section, #hero { padding: 80px 24px; }
    .about-grid, .export-layout, .tech-layout { grid-template-columns: 1fr; gap: 40px; }
    .products-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .hero-stats { display: none;
